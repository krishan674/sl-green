<!DOCTYPE html>
<html>
<head>
<title>Green Plant Shop</title>

<style>
body {
  font-family: Arial;
  background-color: #eaffea;
  text-align: center;
}

h1 {
  color: green;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 220px;
  margin: 20px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px gray;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: green;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>

<script>
function orderNow(plant) {
  alert("You selected: " + plant + "\\nOrder via WhatsApp!");
}
</script>

</head>
